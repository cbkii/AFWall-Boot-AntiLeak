name: PR 40 Conflict Resolver

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pr40-conflict-resolve.yml"

permissions:
  contents: write

concurrency:
  group: pr40-conflict-resolver
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest

    steps:
      - name: Verify exact same-repository PR head
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          head_ref="$(gh api repos/${{ github.repository }}/pulls/40 --jq .head.ref)"
          head_repo="$(gh api repos/${{ github.repository }}/pulls/40 --jq .head.repo.full_name)"
          head_sha="$(gh api repos/${{ github.repository }}/pulls/40 --jq .head.sha)"
          [ "$head_ref" = 'perf-improvements-2732395343243030959' ]
          [ "$head_repo" = '${{ github.repository }}' ]
          [ "$head_sha" = 'dc9dc2ce8dac7cd5fc61ef2f4d064cd96b86f04a' ]

      - name: Checkout exact PR branch
        uses: actions/checkout@v4
        with:
          ref: perf-improvements-2732395343243030959
          fetch-depth: 0
          persist-credentials: false

      - name: Install validation dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends busybox shellcheck zip unzip gcc binutils

      - name: Merge current main and resolve the validation workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main

          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e

          unresolved="$(git diff --name-only --diff-filter=U)"
          if [ "$merge_status" -ne 0 ] && [ "$unresolved" != '.github/workflows/ci.yml' ]; then
            printf 'Unexpected merge conflicts:\n%s\n' "$unresolved" >&2
            exit 1
          fi

          cat > .github/workflows/ci.yml <<'EOF_CI'
          name: CI

          # Run on pull requests and main-branch pushes. README and ADVANCED changes are
          # included because config documentation is validated against runtime keys.
          on:
            pull_request:
              branches: [master, main]
            push:
              branches: [master, main]
              paths-ignore:
                - ".gitignore"
                - ".gitattributes"
                - ".shellcheckrc"

          # Minimal permissions: read-only checkout is sufficient for CI.
          permissions:
            contents: read

          jobs:
            build-and-validate:
              name: Build and Validate Module ZIP
              runs-on: ubuntu-latest

              steps:
                - name: Checkout repository
                  uses: actions/checkout@v4

                - name: Install dependencies
                  run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends busybox shellcheck zip unzip gcc binutils

                - name: Lint and syntax-check module shell scripts
                  run: |
                    shellcheck --severity=warning \
                      bin/common.sh \
                      bin/generation_guard.sh \
                      bin/installer_config.sh \
                      bin/lowlevel.sh \
                      action.sh \
                      post-fs-data.sh \
                      reconfigure.sh \
                      service.sh \
                      uninstall.sh \
                      tests/test-common-helpers.sh \
                      tests/test-generation-guard.sh \
                      tests/test-reconciliation.sh \
                      tools/config-doc-tests.sh \
                      tools/keycheck-tests.sh \
                      tools/mock-logic-tests.sh \
                      tools/recovery-tests.sh \
                      tools/timeline-sim-tests.sh \
                      tools/transport-readiness-tests.sh \
                      tools/build-release.sh \
                      tools/validate-zip.sh
                    git ls-files -z '*.sh' | xargs -0 -r -n1 sh -n

                - name: Test generation-aware AFWall handoff
                  run: |
                    chmod +x tests/test-common-helpers.sh tests/test-generation-guard.sh tests/test-reconciliation.sh tools/config-doc-tests.sh tools/keycheck-tests.sh tools/mock-logic-tests.sh tools/recovery-tests.sh tools/timeline-sim-tests.sh tools/transport-readiness-tests.sh
                    busybox ash tests/test-common-helpers.sh
                    dash tests/test-common-helpers.sh
                    busybox ash tests/test-generation-guard.sh
                    dash tests/test-generation-guard.sh
                    busybox ash tests/test-reconciliation.sh
                    dash tests/test-reconciliation.sh
                    sh tools/config-doc-tests.sh
                    sh tools/keycheck-tests.sh
                    sh tools/mock-logic-tests.sh
                    sh tools/recovery-tests.sh
                    sh tools/timeline-sim-tests.sh
                    sh tools/transport-readiness-tests.sh

                - name: Build module ZIP
                  run: |
                    chmod +x tools/build-release.sh
                    MODULE_ID="$(grep '^id=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
                    VERSION="$(grep '^version=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
                    tools/build-release.sh dist/ "${MODULE_ID}-${VERSION}.zip" "${MODULE_ID}.zip"

                - name: Validate ZIP structure
                  run: |
                    chmod +x tools/validate-zip.sh
                    MODULE_ID="$(grep '^id=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
                    VERSION="$(grep '^version=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
                    tools/validate-zip.sh "dist/${MODULE_ID}-${VERSION}.zip"
                    tools/validate-zip.sh "dist/${MODULE_ID}.zip"

                - name: Upload module ZIP artifact
                  uses: actions/upload-artifact@v4
                  with:
                    name: module-zip
                    path: dist/*.zip
                    retention-days: 14

                - name: Upload checksum artifact
                  uses: actions/upload-artifact@v4
                  with:
                    name: sha256sum
                    path: dist/sha256sum.txt
                    retention-days: 14

                - name: Upload build info artifact
                  uses: actions/upload-artifact@v4
                  with:
                    name: build-info
                    path: dist/build-info.txt
                    retention-days: 14
          EOF_CI

          # Do not carry this one-shot write workflow into the PR branch.
          rm -f .github/workflows/pr40-conflict-resolve.yml
          git add .github/workflows/ci.yml .github/workflows/pr40-conflict-resolve.yml

          remaining="$(git diff --name-only --diff-filter=U)"
          [ -z "$remaining" ] || {
            printf 'Unresolved merge paths remain:\n%s\n' "$remaining" >&2
            exit 1
          }
          git diff --cached --check
          test -x bin/keycheck/keycheck-x86_64
          test ! -e bin/keycheck/keycheck-x86_64.placeholder

      - name: Run full shell test matrix
        run: |
          shellcheck --severity=warning \
            bin/common.sh bin/generation_guard.sh bin/installer_config.sh bin/lowlevel.sh \
            action.sh post-fs-data.sh reconfigure.sh service.sh uninstall.sh \
            tests/test-common-helpers.sh tests/test-generation-guard.sh tests/test-reconciliation.sh \
            tools/config-doc-tests.sh tools/keycheck-tests.sh tools/mock-logic-tests.sh \
            tools/recovery-tests.sh tools/timeline-sim-tests.sh tools/transport-readiness-tests.sh \
            tools/build-release.sh tools/validate-zip.sh
          git ls-files -z '*.sh' | xargs -0 -r -n1 sh -n
          busybox ash tests/test-common-helpers.sh
          dash tests/test-common-helpers.sh
          busybox ash tests/test-generation-guard.sh
          dash tests/test-generation-guard.sh
          busybox ash tests/test-reconciliation.sh
          dash tests/test-reconciliation.sh
          sh tools/config-doc-tests.sh
          sh tools/keycheck-tests.sh
          sh tools/mock-logic-tests.sh
          sh tools/recovery-tests.sh
          sh tools/timeline-sim-tests.sh
          sh tools/transport-readiness-tests.sh

      - name: Build and validate both module ZIPs
        run: |
          MODULE_ID="$(grep '^id=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          VERSION="$(grep '^version=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          tools/build-release.sh dist/ "${MODULE_ID}-${VERSION}.zip" "${MODULE_ID}.zip"
          tools/validate-zip.sh "dist/${MODULE_ID}-${VERSION}.zip"
          tools/validate-zip.sh "dist/${MODULE_ID}.zip"

      - name: Commit and push conflict resolution
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git status --short
          git commit -m 'Merge current main and resolve CI validation conflict'
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin HEAD:perf-improvements-2732395343243030959
          git remote set-url origin "https://github.com/${{ github.repository }}.git"
