name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-final-ps-fallback:
    if: github.head_ref == 'perf-improvements-2732395343243030959'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: perf-improvements-2732395343243030959
          fetch-depth: 1

      - name: Apply focused process fallback fix and regression test
        run: |
          python3 - <<'PY'
          from pathlib import Path

          common = Path('bin/common.sh')
          text = common.read_text()
          old = '''afwall_process_present() {
  local pkg="$1" esc_pkg
  [ -n "$pkg" ] || return 1

  # Method 1: pidof
  if has_cmd pidof && pidof "$pkg" >/dev/null 2>&1; then
    return 0
  fi

  # Method 2: ps
  esc_pkg="$(printf '%s' "$pkg" | sed 's/\./\\./g')"
  if has_cmd ps; then
    ps -A 2>/dev/null | grep -qE "[[:space:]]${esc_pkg}(:[[:alnum:]_]+)?$" && return 0
    ps    2>/dev/null | grep -qE "[[:space:]]${esc_pkg}(:[[:alnum:]_]+)?$" && return 0
    return 1
  fi

  # Method 3: /proc/*/cmdline — fallback for environments where pidof/ps are
  # restricted or return unexpected output formats.
  local f first_arg
  for f in /proc/[0-9]*/cmdline; do
    [ -f "$f" ] || continue
    _afwall_cmdline_matches_pkg "$f" "$pkg" && return 0
  done

  return 1
}
'''
          new = '''_afwall_proc_matches_pkg() {
  local pkg="$1" proc_root="${2:-/proc}" f
  for f in "$proc_root"/[0-9]*/cmdline; do
    [ -f "$f" ] || continue
    _afwall_cmdline_matches_pkg "$f" "$pkg" && return 0
  done
  return 1
}

afwall_process_present() {
  local pkg="$1" esc_pkg ps_output="" ps_usable=0
  [ -n "$pkg" ] || return 1

  # Method 1: pidof
  if has_cmd pidof && pidof "$pkg" >/dev/null 2>&1; then
    return 0
  fi

  # Method 2: ps. A successful listing with no match is authoritative. If both
  # supported forms fail, continue to the /proc fallback instead of confusing
  # command presence with usable output.
  esc_pkg="$(printf '%s' "$pkg" | sed 's/\./\\./g')"
  if has_cmd ps; then
    if ps_output="$(ps -A 2>/dev/null)"; then
      ps_usable=1
      printf '%s\n' "$ps_output" | grep -qE "[[:space:]]${esc_pkg}(:[[:alnum:]_]+)?$" && return 0
    fi
    if ps_output="$(ps 2>/dev/null)"; then
      ps_usable=1
      printf '%s\n' "$ps_output" | grep -qE "[[:space:]]${esc_pkg}(:[[:alnum:]_]+)?$" && return 0
    fi
    [ "$ps_usable" = 1 ] && return 1
  fi

  # Method 3: /proc/*/cmdline — last resort when no usable ps listing exists.
  _afwall_proc_matches_pkg "$pkg" /proc
}
'''
          if old not in text:
              raise SystemExit('afwall_process_present block changed unexpectedly')
          common.write_text(text.replace(old, new, 1))

          test = Path('tests/test-common-helpers.sh')
          text = test.read_text()
          old_test = '''ps(){ echo 'u0 1 0 S com.example'; }
assert_false 'usable ps miss is authoritative' afwall_process_present dev.ukanth.ufirewall.donate
[ "$FAIL" = 0 ] || exit 1
'''
          new_test = '''ps(){ echo 'u0 1 0 S com.example'; }
assert_false 'usable ps miss is authoritative' afwall_process_present dev.ukanth.ufirewall.donate
ps(){ return 1; }
PROC_FALLBACK_CALLED=0
_afwall_proc_matches_pkg(){ PROC_FALLBACK_CALLED=1; return 0; }
assert_true 'failed ps forms fall back to proc' afwall_process_present dev.ukanth.ufirewall.donate
[ "$PROC_FALLBACK_CALLED" = 1 ] && pass 'proc fallback was invoked after unusable ps' || fail 'proc fallback was not invoked after unusable ps'
[ "$FAIL" = 0 ] || exit 1
'''
          if old_test not in text:
              raise SystemExit('common helper ps test block changed unexpectedly')
          test.write_text(text.replace(old_test, new_test, 1))
          PY

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends busybox shellcheck zip unzip

      - name: Run complete permanent verification matrix
        run: |
          shellcheck --severity=warning \
            bin/common.sh bin/generation_guard.sh bin/installer_config.sh bin/lowlevel.sh \
            action.sh post-fs-data.sh reconfigure.sh service.sh uninstall.sh \
            tests/test-common-helpers.sh tests/test-generation-guard.sh tests/test-reconciliation.sh \
            tools/config-doc-tests.sh tools/mock-logic-tests.sh tools/recovery-tests.sh \
            tools/timeline-sim-tests.sh tools/transport-readiness-tests.sh \
            tools/build-release.sh tools/validate-zip.sh
          git ls-files -z '*.sh' | xargs -0 -r -n1 sh -n
          busybox ash tests/test-common-helpers.sh
          dash tests/test-common-helpers.sh
          busybox ash tests/test-generation-guard.sh
          dash tests/test-generation-guard.sh
          busybox ash tests/test-reconciliation.sh
          dash tests/test-reconciliation.sh
          sh tools/config-doc-tests.sh
          sh tools/mock-logic-tests.sh
          sh tools/recovery-tests.sh
          sh tools/timeline-sim-tests.sh
          sh tools/transport-readiness-tests.sh
          MODULE_ID="$(grep '^id=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          VERSION="$(grep '^version=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          tools/build-release.sh dist/ "${MODULE_ID}-${VERSION}.zip" "${MODULE_ID}.zip"
          tools/validate-zip.sh "dist/${MODULE_ID}-${VERSION}.zip"
          tools/validate-zip.sh "dist/${MODULE_ID}.zip"

      - name: Commit validated runtime and test fix
        run: |
          git add bin/common.sh tests/test-common-helpers.sh
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: fall back to proc when ps is unusable'
          git push origin HEAD:perf-improvements-2732395343243030959
