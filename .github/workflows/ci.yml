name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - ".gitignore"
      - ".gitattributes"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and build module
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          show-progress: false

      - name: Install host-test dependencies
        run: >-
          sudo apt-get update -qq &&
          sudo apt-get install -y --no-install-recommends
          busybox dash shellcheck zip unzip gcc binutils python3

      - name: Run repository validation
        run: |
          if sh tests/run.sh > validation.log 2>&1; then
            cat validation.log
          else
            status=$?
            cat validation.log
            exit "$status"
          fi

      - name: Upload validation failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-failure-${{ github.run_id }}
          path: validation.log
          retention-days: 3

      - name: Build and validate release ZIPs
        run: |
          MODULE_ID="$(grep '^id=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          VERSION="$(grep '^version=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          tools/build-release.sh dist/ "${MODULE_ID}-${VERSION}.zip" "${MODULE_ID}.zip"
          tools/validate-zip.sh "dist/${MODULE_ID}-${VERSION}.zip"
          tools/validate-zip.sh "dist/${MODULE_ID}.zip"

      - name: Upload validated build
        uses: actions/upload-artifact@v4
        with:
          name: module-build
          path: dist/
          retention-days: 14
