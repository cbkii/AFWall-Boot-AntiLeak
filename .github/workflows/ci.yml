name: CI

# Run on every pull request and on pushes to the main branch.
# Skips documentation-only changes that cannot affect installability.
on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
    paths-ignore:
      - "README.md"
      - "ADVANCED.md"
      - ".gitignore"
      - ".gitattributes"
      - ".shellcheckrc"

# Temporary PR #37 documentation-hardening permission. Restored to read-only
# after the validated ADVANCED.md cleanup commit is pushed.
permissions:
  contents: write

jobs:
  build-and-validate:
    name: Build and Validate Module ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Apply reviewed PR #37 advanced-reference cleanup
        if: github.event_name == 'pull_request' && github.head_ref == 'legacy-cleanup-15466434636892910097'
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('ADVANCED.md')
          text = path.read_text()
          old = 'Non-interactive fallback uses installer defaults and module-local config only. Legacy external runtime config is ignored by service/post-fs-data and does not affect boot behaviour.'
          new = 'Non-interactive fallback uses installer defaults and writes module-local configuration only.'
          if old in text:
              path.write_text(text.replace(old, new, 1))
          elif new not in text:
              raise SystemExit('expected advanced-reference sentence not found')
          PY

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends busybox shellcheck zip unzip

      - name: Lint module shell scripts (shellcheck)
        run: |
          shellcheck --severity=warning \
            bin/common.sh \
            bin/generation_guard.sh \
            bin/installer_config.sh \
            bin/lowlevel.sh \
            action.sh \
            post-fs-data.sh \
            reconfigure.sh \
            service.sh \
            uninstall.sh \
            tests/test-generation-guard.sh \
            tests/test-reconciliation.sh \
            tools/mock-logic-tests.sh \
            tools/timeline-sim-tests.sh \
            tools/build-release.sh \
            tools/validate-zip.sh

      - name: Test generation-aware AFWall handoff
        run: |
          chmod +x tests/test-generation-guard.sh tests/test-reconciliation.sh tools/mock-logic-tests.sh tools/timeline-sim-tests.sh
          busybox ash tests/test-generation-guard.sh
          dash tests/test-generation-guard.sh
          busybox ash tests/test-reconciliation.sh
          dash tests/test-reconciliation.sh
          sh tools/mock-logic-tests.sh
          sh tools/timeline-sim-tests.sh

      - name: Build module ZIP
        run: |
          chmod +x tools/build-release.sh
          MODULE_ID="$(grep '^id=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          VERSION="$(grep '^version=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          tools/build-release.sh dist/ "${MODULE_ID}-${VERSION}.zip" "${MODULE_ID}.zip"

      - name: Validate ZIP structure
        run: |
          chmod +x tools/validate-zip.sh
          MODULE_ID="$(grep '^id=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          VERSION="$(grep '^version=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          tools/validate-zip.sh "dist/${MODULE_ID}-${VERSION}.zip"
          tools/validate-zip.sh "dist/${MODULE_ID}.zip"

      - name: Commit validated PR #37 advanced-reference cleanup
        if: github.event_name == 'pull_request' && github.head_ref == 'legacy-cleanup-15466434636892910097'
        run: |
          git add ADVANCED.md
          if git diff --cached --quiet; then
            echo "ADVANCED.md already clean"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: remove obsolete external-config fallback wording"
          git push origin "HEAD:${{ github.head_ref }}"

      - name: Upload module ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: module-zip
          path: dist/*.zip
          retention-days: 14

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: sha256sum
          path: dist/sha256sum.txt
          retention-days: 14

      - name: Upload build info artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: dist/build-info.txt
          retention-days: 14
