name: CI

# Run on every pull request and on pushes to the main branch.
# Skips documentation-only changes that cannot affect installability.
on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
    paths-ignore:
      - "README.md"
      - "ADVANCED.md"
      - ".gitignore"
      - ".gitattributes"
      - ".shellcheckrc"

# Temporary PR #37 hardening permission. Restored to read-only after the
# validated service.sh cleanup commit is pushed.
permissions:
  contents: write

jobs:
  build-and-validate:
    name: Build and Validate Module ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Apply reviewed PR #37 service cleanup
        if: github.event_name == 'pull_request' && github.head_ref == 'legacy-cleanup-15466434636892910097'
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('service.sh')
          text = path.read_text()
          old = 'log "service: watchdog config: sourced=${CONFIG_SOURCED_FILES:-unknown} ignored=${CONFIG_IGNORED_FILES:-none} policy=${WATCHDOG_POLICY} service=${WATCHDOG_SERVICE_SECS}s boot=${WATCHDOG_BOOT_COMPLETED_SECS}s"'
          new = 'log "service: watchdog config: sourced=${CONFIG_SOURCED_FILES:-unknown} policy=${WATCHDOG_POLICY} service=${WATCHDOG_SERVICE_SECS}s boot=${WATCHDOG_BOOT_COMPLETED_SECS}s"'
          if old in text:
              path.write_text(text.replace(old, new, 1))
          elif new not in text:
              raise SystemExit('expected watchdog config log line not found')
          PY

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends busybox shellcheck zip unzip

      # ── Lint: module runtime scripts ────────────────────────────────────────
      # Checks the module's own shell scripts (not third-party MMT-Extended
      # files or sourced-only config/install stubs).
      # .shellcheckrc sets shell=ash and disables ash/Android false positives.
      - name: Lint module shell scripts (shellcheck)
        run: |
          shellcheck --severity=warning \
            bin/common.sh \
            bin/generation_guard.sh \
            bin/installer_config.sh \
            bin/lowlevel.sh \
            action.sh \
            post-fs-data.sh \
            reconfigure.sh \
            service.sh \
            uninstall.sh \
            tests/test-generation-guard.sh \
            tests/test-reconciliation.sh \
            tools/mock-logic-tests.sh \
            tools/timeline-sim-tests.sh \
            tools/build-release.sh \
            tools/validate-zip.sh

      - name: Test generation-aware AFWall handoff
        run: |
          chmod +x tests/test-generation-guard.sh tests/test-reconciliation.sh tools/mock-logic-tests.sh tools/timeline-sim-tests.sh
          busybox ash tests/test-generation-guard.sh
          dash tests/test-generation-guard.sh
          busybox ash tests/test-reconciliation.sh
          dash tests/test-reconciliation.sh
          sh tools/mock-logic-tests.sh
          sh tools/timeline-sim-tests.sh

      # ── Build: produce the installable ZIP ──────────────────────────────────
      - name: Build module ZIP
        run: |
          chmod +x tools/build-release.sh
          MODULE_ID="$(grep '^id=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          VERSION="$(grep '^version=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          tools/build-release.sh dist/ "${MODULE_ID}-${VERSION}.zip" "${MODULE_ID}.zip"

      # ── Validate: check ZIP internal structure ──────────────────────────────
      - name: Validate ZIP structure
        run: |
          chmod +x tools/validate-zip.sh
          MODULE_ID="$(grep '^id=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          VERSION="$(grep '^version=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          tools/validate-zip.sh "dist/${MODULE_ID}-${VERSION}.zip"
          tools/validate-zip.sh "dist/${MODULE_ID}.zip"

      - name: Commit validated PR #37 service cleanup
        if: github.event_name == 'pull_request' && github.head_ref == 'legacy-cleanup-15466434636892910097'
        run: |
          git add service.sh
          if git diff --cached --quiet; then
            echo "service.sh already clean"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: remove stale watchdog legacy field"
          git push origin "HEAD:${{ github.head_ref }}"

      # ── Upload: make artifacts available for PR review ──────────────────────
      - name: Upload module ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: module-zip
          path: dist/*.zip
          # Keep for 14 days so reviewers can download and test
          retention-days: 14

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: sha256sum
          path: dist/sha256sum.txt
          retention-days: 14

      - name: Upload build info artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: dist/build-info.txt
          retention-days: 14
