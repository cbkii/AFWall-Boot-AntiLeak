name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build-and-validate:
    name: Build and Validate Module ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Apply reviewed PR 39 hardening fixes
        if: github.event_name == 'pull_request' && github.head_ref == 'perf-improvements-2732395343243030959'
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_exact(path: str, old: str, new: str, count: int = 1) -> None:
              p = Path(path)
              text = p.read_text()
              actual = text.count(old)
              if actual != count:
                  raise SystemExit(f"{path}: expected {count} exact match(es), found {actual}")
              p.write_text(text.replace(old, new, count))

          # Preserve values read from newline-less sysfs files while still
          # clearing stale state before every read.
          p = Path('bin/lowlevel.sh')
          text = p.read_text()
          text, count = re.subn(
              r'(IFS= read -r ([A-Za-z_][A-Za-z0-9_]*) < "[^"]+/operstate" 2>/dev/null) \|\| \2=""',
              r'\1 || :',
              text,
          )
          if count != 8:
              raise SystemExit(f"bin/lowlevel.sh: expected 8 operstate fallbacks, changed {count}")

