  [ ! -e "$LL_STATE_DIR/ifaces_down" ] || fail "successful interface retry did not clear marker"
  pass "interface recovery retry clears retained marker"

  printf 'wlan0' > "$LL_STATE_DIR/ifaces_down"
  _find_cmd() { return 1; }
  _ll_restore_recorded_interfaces emergency || :
  [ "$(cat "$LL_STATE_DIR/ifaces_down")" = wlan0 ] || fail "missing ip command discarded interface retry state"
  pass "missing ip command preserves interface marker"

  printf 'rndis0' > "$LL_STATE_DIR/tether_ifaces_down"
  touch "$LL_STATE_DIR/tether_was_active"
  _ll_emergency_tether_note
  [ ! -e "$LL_STATE_DIR/tether_was_active" ] || fail "tether activity note marker was not cleared"
  [ -e "$LL_STATE_DIR/tether_ifaces_down" ] || fail "tether note discarded failed interface retry state"
  pass "tether note does not restart tethering or erase interface retry state"

  rm -f "$LL_STATE_DIR"/*
  touch "$LL_STATE_DIR/wifi_was_enabled"
  has_cmd() { [ "$1" = cmd ]; }
  cmd() { return 0; }
  _ll_emergency_restore_wifi
  [ ! -e "$LL_STATE_DIR/wifi_was_enabled" ] || fail "successful Wi-Fi restore kept retry marker"
  touch "$LL_STATE_DIR/wifi_was_enabled"
  has_cmd() { return 1; }
  _ll_emergency_restore_wifi
  [ -e "$LL_STATE_DIR/wifi_was_enabled" ] || fail "failed Wi-Fi restore removed retry marker"
  pass "Wi-Fi recovery marker ownership"

  touch "$LL_STATE_DIR/data_was_enabled" "$LL_STATE_DIR/bt_was_enabled"
  _ll_emergency_restore_mobile
  _ll_emergency_restore_bt
  [ -e "$LL_STATE_DIR/data_was_enabled" ] || fail "failed mobile restore removed retry marker"
  [ -e "$LL_STATE_DIR/bt_was_enabled" ] || fail "failed Bluetooth restore removed retry marker"
  pass "mobile and Bluetooth failures retain retry markers"

  ORDER=''
  _ll_emergency_restore_interfaces() { ORDER="$ORDER interfaces"; }
  lowlevel_vpn_lockdown_release_if_needed() { ORDER="$ORDER vpn"; }
  _ll_emergency_restore_wifi() { ORDER="$ORDER wifi"; }
  _ll_emergency_restore_mobile() { ORDER="$ORDER mobile"; }
  _ll_emergency_restore_bt() { ORDER="$ORDER bt"; }
  _ll_emergency_tether_note() { ORDER="$ORDER tether"; }
  _ll_state_rm() { :; }
  lowlevel_emergency_restore
  [ "$ORDER" = ' interfaces vpn wifi mobile bt tether' ] || fail "emergency recovery call order changed: $ORDER"
  pass "emergency recovery preserves VPN and service order"
}
