name: Release

# Manual-only release flow:
#   1) Run from Actions UI (workflow_dispatch), or
#   2) Comment `/release` (optionally `/release <tag>`) on a PR.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (branch, tag, or commit SHA). Defaults to current ref."
        required: false
        type: string
        default: ""
      tag:
        description: "Release tag to create (defaults to module.prop versionCode)."
        required: false
        type: string
        default: ""
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: false

  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  release:
    name: Build, Tag, and Publish Release
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/release')
      )

    steps:
      - name: Validate comment author can trigger releases
        if: github.event_name == 'issue_comment'
        run: |
          case "${{ github.event.comment.author_association }}" in
            OWNER|MEMBER|COLLABORATOR)
              echo "Authorized trigger from ${{ github.event.comment.user.login }}"
              ;;
            *)
              echo "::error::Unauthorized release trigger from ${{ github.event.comment.user.login }} (${{ github.event.comment.author_association }})."
              exit 1
              ;;
          esac

      - name: Resolve ref and optional tag input
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF_INPUT="${{ inputs.ref }}"
            TAG_INPUT="${{ inputs.tag }}"
            if [ -n "$REF_INPUT" ]; then
              REF="$REF_INPUT"
            else
              REF="${{ github.ref }}"
            fi
          else
            PR_NUMBER="${{ github.event.issue.number }}"
            REF="$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER --jq '.head.sha')"
            TAG_INPUT="$(printf '%s' "${{ github.event.comment.body }}" | sed -nE 's#^/release[[:space:]]+([^[:space:]]+).*$#\1#p' | head -1)"
          fi

          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "tag_input=$TAG_INPUT" >> "$GITHUB_OUTPUT"
          echo "Resolved ref=$REF tag_input=${TAG_INPUT:-<none>}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get install -y --no-install-recommends zip

      - name: Read version metadata from module.prop
        id: meta
        run: |
          VERSION="$(grep '^version=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          VERSION_CODE="$(grep '^versionCode=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          MODULE_ID="$(grep '^id=' module.prop | cut -d= -f2 | tr -d '[:space:]')"

          if [ -z "$VERSION" ] || [ -z "$VERSION_CODE" ] || [ -z "$MODULE_ID" ]; then
            echo "::error::Could not parse id/version/versionCode from module.prop"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "module_id=$MODULE_ID" >> "$GITHUB_OUTPUT"

      - name: Determine and validate release tag
        id: tag
        run: |
          if [ -n "${{ steps.resolve.outputs.tag_input }}" ]; then
            RELEASE_TAG="${{ steps.resolve.outputs.tag_input }}"
          else
            RELEASE_TAG="${{ steps.meta.outputs.version_code }}"
          fi

          if [ "$RELEASE_TAG" != "${{ steps.meta.outputs.version_code }}" ]; then
            echo "::error::Release tag ($RELEASE_TAG) must match module.prop versionCode (${{ steps.meta.outputs.version_code }})."
            exit 1
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure executable permissions for module scripts
        run: |
          chmod 755 \
            action.sh \
            customize.sh \
            post-fs-data.sh \
            reconfigure.sh \
            service.sh \
            uninstall.sh

      - name: Build release ZIP
        run: |
          chmod +x tools/build-release.sh
          ZIP_NAME="${{ steps.meta.outputs.module_id }}-${{ steps.meta.outputs.version }}.zip"
          tools/build-release.sh dist/ "$ZIP_NAME"

      - name: Validate ZIP structure
        run: |
          chmod +x tools/validate-zip.sh
          tools/validate-zip.sh "dist/${{ steps.meta.outputs.module_id }}-${{ steps.meta.outputs.version }}.zip"

      - name: Create tag if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ steps.tag.outputs.release_tag }}"
          TARGET_SHA="${{ steps.resolve.outputs.ref }}"
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists."
          else
            git tag -a "$RELEASE_TAG" "$TARGET_SHA" -m "Release ${{ steps.meta.outputs.version }} ($RELEASE_TAG)"
            git push origin "$RELEASE_TAG"
            echo "Created and pushed tag $RELEASE_TAG -> $TARGET_SHA"
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ steps.tag.outputs.release_tag }}"
          VERSION="${{ steps.meta.outputs.version }}"
          VERSION_CODE="${{ steps.meta.outputs.version_code }}"
          MODULE_ID="${{ steps.meta.outputs.module_id }}"
          ZIP_PATH="dist/${MODULE_ID}-${VERSION}.zip"
          DRAFT_FLAG=""
          if [ "${{ inputs.draft }}" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi

          PREV_TAG="$(git tag --list '[0-9]*' --sort=v:refname | awk -v cur="$RELEASE_TAG" '$1 < cur {prev=$1} END {print prev}')"
          CHANGELOG_LINE=""
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG_LINE="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${RELEASE_TAG}"
          fi

          NOTES="See [README](https://github.com/${{ github.repository }}) 👀
- Release \\`${VERSION}\\` (versionCode \\`${VERSION_CODE}\\`)

## What's Changed
* Automated module build + packaging for ${VERSION}.
${CHANGELOG_LINE}"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$VERSION" --notes "$NOTES" $DRAFT_FLAG
            gh release upload "$RELEASE_TAG" "$ZIP_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" \
              --title "$VERSION" \
              --notes "$NOTES" \
              $DRAFT_FLAG \
              "$ZIP_PATH"
          fi

          echo "Release published: https://github.com/${{ github.repository }}/releases/tag/${RELEASE_TAG}"
