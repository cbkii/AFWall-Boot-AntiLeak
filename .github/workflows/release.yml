name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Trusted branch, tag, or commit to publish"
        required: false
        type: string
        default: "main"
      draft:
        description: "Create a draft release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  publish:
    name: Validate and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Checkout immutable release source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install validation dependencies
        run: >-
          sudo apt-get update -qq &&
          sudo apt-get install -y --no-install-recommends
          busybox dash shellcheck zip unzip gcc binutils python3

      - name: Validate source tree
        run: sh tests/run.sh

      - name: Read release metadata
        id: metadata
        run: |
          MODULE_ID="$(grep '^id=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          VERSION="$(grep '^version=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          VERSION_CODE="$(grep '^versionCode=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          TARGET_SHA="$(git rev-parse HEAD)"

          [ -n "$MODULE_ID" ] && [ -n "$VERSION" ] && [ -n "$VERSION_CODE" ] || {
            echo "::error::module.prop must define id, version and versionCode"
            exit 1
          }
          python3 tools/sync-version-metadata.py --check

          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION_CODE}" >/dev/null 2>&1; then
            echo "::error::Tag ${VERSION_CODE} already exists. Bump and review release metadata before publishing another release."
            exit 1
          fi
          if gh release view "$VERSION_CODE" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "::error::Release ${VERSION_CODE} already exists. Existing releases are immutable."
            exit 1
          fi

          echo "module_id=$MODULE_ID" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and validate release ZIPs
        run: |
          MODULE_ID="${{ steps.metadata.outputs.module_id }}"
          VERSION="${{ steps.metadata.outputs.version }}"
          tools/build-release.sh dist/ "${MODULE_ID}-${VERSION}.zip" "${MODULE_ID}.zip"
          tools/validate-zip.sh "dist/${MODULE_ID}-${VERSION}.zip"
          tools/validate-zip.sh "dist/${MODULE_ID}.zip"

      - name: Publish immutable GitHub release
        run: |
          MODULE_ID="${{ steps.metadata.outputs.module_id }}"
          VERSION="${{ steps.metadata.outputs.version }}"
          VERSION_CODE="${{ steps.metadata.outputs.version_code }}"
          TARGET_SHA="${{ steps.metadata.outputs.target_sha }}"
          DRAFT_FLAG=""
          [ "${{ inputs.draft }}" = "true" ] && DRAFT_FLAG="--draft"

          gh release create "$VERSION_CODE" \
            --repo "$GH_REPO" \
            --target "$TARGET_SHA" \
            --title "$VERSION" \
            --generate-notes \
            $DRAFT_FLAG \
            "dist/${MODULE_ID}-${VERSION}.zip" \
            "dist/${MODULE_ID}.zip" \
            dist/sha256sum.txt \
            dist/build-info.txt \
            update.json
