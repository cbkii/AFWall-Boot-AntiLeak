name: Release

# Manual-only release flow:
#   1) Run from Actions UI (workflow_dispatch), or
#   2) Comment `/release` (optionally `/release <tag>`) on a PR.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (branch, tag, or commit SHA). Defaults to current ref."
        required: false
        type: string
        default: ""
      tag:
        description: "Release tag to create (defaults to module.prop versionCode)."
        required: false
        type: string
        default: ""
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: false

  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  release:
    name: Build, Tag, and Publish Release
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        (
          github.event.comment.body == '/release' ||
          startsWith(github.event.comment.body, '/release ')
        )
      )

    steps:
      - name: Validate comment author can trigger releases
        if: github.event_name == 'issue_comment'
        run: |
          case "${{ github.event.comment.author_association }}" in
            OWNER|MEMBER|COLLABORATOR)
              echo "Authorized trigger from ${{ github.event.comment.user.login }}"
              ;;
            *)
              echo "::error::Unauthorized release trigger from ${{ github.event.comment.user.login }} (${{ github.event.comment.author_association }})."
              exit 1
              ;;
          esac

      - name: Resolve ref and optional tag input
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF_INPUT="${{ inputs.ref }}"
            TAG_INPUT="${{ inputs.tag }}"
            if [ -n "$REF_INPUT" ]; then
              REF="$REF_INPUT"
            else
              REF="${{ github.ref }}"
            fi
          else
            PR_NUMBER="${{ github.event.issue.number }}"
            # Resolve to the PR's BASE branch (a trusted, protected ref owned by this
            # repo), NOT the contributor's head SHA.  Checking out untrusted fork code
            # while this job holds contents:write is a pwn-request attack vector.
            REF="$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER --jq '.base.ref')"
            TAG_INPUT="$(printf '%s' "${{ github.event.comment.body }}" | sed -nE 's#^/release[[:space:]]+([^[:space:]]+).*$#\1#p' | head -1)"
          fi

          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "tag_input=$TAG_INPUT" >> "$GITHUB_OUTPUT"
          echo "Resolved ref=$REF tag_input=${TAG_INPUT:-<none>}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get install -y --no-install-recommends zip

      - name: Read version metadata from module.prop
        id: meta
        run: |
          VERSION="$(grep '^version=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          VERSION_CODE="$(grep '^versionCode=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          MODULE_ID="$(grep '^id=' module.prop | cut -d= -f2 | tr -d '[:space:]')"

          if [ -z "$VERSION" ] || [ -z "$VERSION_CODE" ] || [ -z "$MODULE_ID" ]; then
            echo "::error::Could not parse id/version/versionCode from module.prop"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "module_id=$MODULE_ID" >> "$GITHUB_OUTPUT"

      - name: Determine and validate release tag
        id: tag
        run: |
          if [ -n "${{ steps.resolve.outputs.tag_input }}" ]; then
            RELEASE_TAG="${{ steps.resolve.outputs.tag_input }}"
          else
            RELEASE_TAG="${{ steps.meta.outputs.version_code }}"
          fi

          if ! [[ "$RELEASE_TAG" =~ ^[0-9]+$ ]]; then
            echo "::error::Release tag must be a numeric versionCode (got: $RELEASE_TAG)."
            exit 1
          fi

          if [ "$RELEASE_TAG" != "${{ steps.meta.outputs.version_code }}" ]; then
            NEEDS_BUMP=true
          else
            NEEDS_BUMP=false
          fi

          RELEASE_VERSION="$(awk -v c="$RELEASE_TAG" 'BEGIN { printf "v%.1f", c / 1000 }')"

          echo "needs_bump=$NEEDS_BUMP" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Bump module metadata when releasing a new versionCode
        id: bump
        if: steps.tag.outputs.needs_bump == 'true'
        run: |
          BRANCH="$(git symbolic-ref --short -q HEAD || true)"
          if [ -z "$BRANCH" ]; then
            echo "::error::Cannot auto-bump metadata when checkout is detached. Use a branch ref or update module.prop first."
            exit 1
          fi

          RELEASE_TAG="${{ steps.tag.outputs.release_tag }}"
          RELEASE_VERSION="${{ steps.tag.outputs.release_version }}"

          sed -E -i "s/^version=.*/version=${RELEASE_VERSION}/" module.prop
          sed -E -i "s/^versionCode=.*/versionCode=${RELEASE_TAG}/" module.prop

          RELEASE_TAG="$RELEASE_TAG" RELEASE_VERSION="$RELEASE_VERSION" python3 - <<'PY'
          import json
          import os

          release_version = os.environ["RELEASE_VERSION"]
          release_code = int(os.environ["RELEASE_TAG"])

          with open("update.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          data["version"] = release_version
          data["versionCode"] = release_code

          with open("update.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add module.prop update.json
          git commit -m "chore(release): bump module version to ${RELEASE_VERSION} (${RELEASE_TAG})"
          git push origin HEAD:"$BRANCH"

      - name: Read final version metadata
        id: meta_final
        run: |
          VERSION="$(grep '^version=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          VERSION_CODE="$(grep '^versionCode=' module.prop | cut -d= -f2 | tr -d '[:space:]')"
          MODULE_ID="$(grep '^id=' module.prop | cut -d= -f2 | tr -d '[:space:]')"

          if [ -z "$VERSION" ] || [ -z "$VERSION_CODE" ] || [ -z "$MODULE_ID" ]; then
            echo "::error::Could not parse id/version/versionCode from module.prop after release tag processing"
            exit 1
          fi

          if [ "$VERSION_CODE" != "${{ steps.tag.outputs.release_tag }}" ]; then
            echo "::error::Final module.prop versionCode ($VERSION_CODE) does not match release tag (${{ steps.tag.outputs.release_tag }})."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "module_id=$MODULE_ID" >> "$GITHUB_OUTPUT"

      - name: Build release ZIP
        run: |
          chmod +x tools/build-release.sh
          ZIP_NAME="${{ steps.meta_final.outputs.module_id }}-${{ steps.meta_final.outputs.version }}.zip"
          tools/build-release.sh dist/ "$ZIP_NAME"

      - name: Validate ZIP structure
        run: |
          chmod +x tools/validate-zip.sh
          tools/validate-zip.sh "dist/${{ steps.meta_final.outputs.module_id }}-${{ steps.meta_final.outputs.version }}.zip"

      - name: Create tag if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ steps.tag.outputs.release_tag }}"
          TARGET_REF="${{ steps.resolve.outputs.ref }}"
          TARGET_COMMIT="$(git rev-parse "$TARGET_REF")"
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            TAG_COMMIT="$(git rev-parse "${RELEASE_TAG}^{commit}")"
            if [ "$TAG_COMMIT" != "$TARGET_COMMIT" ]; then
              echo "::error::Tag $RELEASE_TAG already exists pointing to $TAG_COMMIT, not $TARGET_COMMIT. Aborting."
              exit 1
            fi
            echo "Tag $RELEASE_TAG already exists and points to the correct commit ($TAG_COMMIT)."
          else
            git tag -a "$RELEASE_TAG" "$TARGET_COMMIT" -m "Release ${{ steps.meta_final.outputs.version }} ($RELEASE_TAG)"
            git push origin "$RELEASE_TAG"
            echo "Created and pushed tag $RELEASE_TAG -> $TARGET_COMMIT"
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ steps.tag.outputs.release_tag }}"
          VERSION="${{ steps.meta_final.outputs.version }}"
          VERSION_CODE="${{ steps.meta_final.outputs.version_code }}"
          MODULE_ID="${{ steps.meta_final.outputs.module_id }}"
          ZIP_PATH="dist/${MODULE_ID}-${VERSION}.zip"
          DRAFT_FLAG=""
          if [ "${{ inputs.draft }}" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi

          PREV_TAG="$(git tag --list '[0-9]*' --sort=v:refname | awk -v cur="$RELEASE_TAG" '$1 < cur {prev=$1} END {print prev}')"
          CHANGELOG_LINE=""
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG_LINE="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${RELEASE_TAG}"
          fi

          NOTES="$(printf '%s\n%s\n\n%s\n%s' \
            "See [README](https://github.com/${{ github.repository }}) 👀" \
            "- Release \`${VERSION}\` (versionCode \`${VERSION_CODE}\`)" \
            "## What's Changed" \
            "* Automated module build + packaging for ${VERSION}.")"
          if [ -n "$CHANGELOG_LINE" ]; then
            NOTES="${NOTES}$(printf '\n%s' "$CHANGELOG_LINE")"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$VERSION" --notes "$NOTES" $DRAFT_FLAG
            gh release upload "$RELEASE_TAG" "$ZIP_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" \
              --title "$VERSION" \
              --notes "$NOTES" \
              $DRAFT_FLAG \
              "$ZIP_PATH"
          fi

          echo "Release published: https://github.com/${{ github.repository }}/releases/tag/${RELEASE_TAG}"
